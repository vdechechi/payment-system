spring.application.name=payment-service
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/paymentdb
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.admin.auto-create=true
spring.kafka.template.default-topic=payments
kafka.topics.payments=payments


springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# AWS / LocalStack
aws.endpoint=http://localhost:4566
aws.region=us-east-1
aws.sqs.fraud-check-queue=fraud-check-queue
aws.dynamodb.payment-events-table=payment-events